server:
  port: 8080

spring:
  application:
    name: usersMicroservice

---
spring:
  profiles:
    active: development

---
# Configuración para perfil desarrollo
spring:
  config:
    activate:
      on-profile: development

  datasource:
    url: jdbc:postgresql://localhost:5432/users_db
    username: postgres
    password: "${PG_PASSWORD}"
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database: postgresql

